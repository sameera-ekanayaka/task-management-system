version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: task_management_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: task_management_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: task_management_backend
    environment:
      DATABASE_URL: "mysql://root:rootpassword@db:3306/task_management_db"
      JWT_SECRET: "your-super-secret-jwt-key-change-this"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

  # Frontend React App
  frontend:
    build: ./frontend
    container_name: task_management_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data: